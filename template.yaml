AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TubeRush - daily game generation Lambdas (connections + crossword)

Parameters:
  SecretName:
    Type: String
    Default: tuberush/daily-games
    Description: Name of the Secrets Manager secret containing API keys

  ConnectionsScheduleExpression:
    Type: String
    Default: cron(0 2 * * ? *)
    Description: EventBridge schedule for connections generation (default 2am UTC daily)

  CrosswordScheduleExpression:
    Type: String
    Default: cron(30 2 * * ? *)
    Description: EventBridge schedule for crossword generation (default 2:30am UTC daily)

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 300
    MemorySize: 512
    Architectures:
      - arm64

Resources:

  # -------------------------------------------------------------------------
  # Secrets Manager — holds all API keys. Populate via AWS Console or CLI
  # after first deploy. See README for key names.
  # -------------------------------------------------------------------------
  DailyGamesSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: API keys for TubeRush nightly game generation
      SecretString: !Sub |
        {
          "ANTHROPIC_API_KEY": "",
          "SUPABASE_URL": "",
          "SUPABASE_SERVICE_ROLE_KEY": "",
          "ANTHROPIC_CONNECTIONS_SKILL_ID": "",
          "ANTHROPIC_CONNECTIONS_SKILL_VERSION": "latest",
          "ANTHROPIC_CROSSWORD_SKILL_ID": "",
          "ANTHROPIC_CROSSWORD_SKILL_VERSION": "latest",
          "DISABLE_CLAUDE_SKILL": ""
        }

  # -------------------------------------------------------------------------
  # Connections Lambda
  # -------------------------------------------------------------------------
  GenerateConnectionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tuberush-generate-connections
      CodeUri: lambda/generate-connections/
      Handler: src/index.handler
      Description: Generates daily connections puzzles via Claude + Connections Generator skill
      Environment:
        Variables:
          SECRET_ARN: !Ref DailyGamesSecret
          NODE_OPTIONS: --enable-source-maps
      Policies:
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref DailyGamesSecret
      Events:
        NightlySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: !Ref ConnectionsScheduleExpression
            Name: tuberush-nightly-connections-generation
            Description: Generate daily connections puzzle at 2am UTC
            State: ENABLED
            RetryPolicy:
              MaximumRetryAttempts: 2
              MaximumEventAgeInSeconds: 3600
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/index.ts
        External:
          - '@aws-sdk/client-secrets-manager'

  # -------------------------------------------------------------------------
  # Crossword Lambda
  # -------------------------------------------------------------------------
  GenerateCrosswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tuberush-generate-crossword
      CodeUri: lambda/generate-crossword/
      Handler: src/index.handler
      Description: Generates daily crossword puzzles via Claude + Crossword Generator skill
      Environment:
        Variables:
          SECRET_ARN: !Ref DailyGamesSecret
          NODE_OPTIONS: --enable-source-maps
      Policies:
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref DailyGamesSecret
      Events:
        NightlySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: !Ref CrosswordScheduleExpression
            Name: tuberush-nightly-crossword-generation
            Description: Generate daily crossword puzzle at 2:30am UTC
            State: ENABLED
            RetryPolicy:
              MaximumRetryAttempts: 2
              MaximumEventAgeInSeconds: 3600
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/index.ts
        External:
          - '@aws-sdk/client-secrets-manager'

Outputs:
  ConnectionsFunctionName:
    Description: Connections Lambda function name
    Value: !Ref GenerateConnectionsFunction

  ConnectionsFunctionArn:
    Description: Connections Lambda function ARN
    Value: !GetAtt GenerateConnectionsFunction.Arn

  CrosswordFunctionName:
    Description: Crossword Lambda function name
    Value: !Ref GenerateCrosswordFunction

  CrosswordFunctionArn:
    Description: Crossword Lambda function ARN
    Value: !GetAtt GenerateCrosswordFunction.Arn

  SecretArn:
    Description: Secrets Manager secret ARN — update this with real values after deploy
    Value: !Ref DailyGamesSecret
