appId: com.tuberush.v2
---
- launchApp:
    clearState: true
- assertVisible: "TubeRush"
- assertVisible: "Mind the Gap. Play the Game."
# Find and tap on Connections game
- scrollUntilVisible:
    element: "Connections"
    direction: DOWN
- tapOn: "Connections"
# Verify Auth Screen appears (Game Guard)
- assertVisible: "Welcome back!"
- assertVisible: "Sign In"
# Dismiss Auth Modal (Swipe Down from top)
- swipe:
    start: 50%, 10%
    end: 50%, 90%
    duration: 400
# Verify we are back on Home
- assertVisible: "TubeRush"
- assertVisible: "Daily Challenges"
