name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (Lint, Typecheck, Unit Test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Unit Tests
        run: npm test

  e2e-test:
    name: E2E Tests (iOS)
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      EXPO_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      EXPO_PUBLIC_SUPABASE_ANON_KEY: "mock-key"
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: "mock-key"
      # Ensure Maestro driver waits enough for simulator boot/app launch
      MAESTRO_DRIVER_STARTUP_TIMEOUT: 120000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Cache CocoaPods global cache to speed up 'pod install'
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Check Maestro Version
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro --version

      # Prebuild generates the native project (ios/ directory).
      # --no-install skips 'pod install' so we can control it and use the global cache effectively.
      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: List Simulators
        run: xcrun simctl list devices available

      - name: Build iOS App
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)

          if [ -z "$WORKSPACE" ]; then
            echo "Error: No .xcworkspace found"
            exit 1
          fi

          SCHEME="tuberushv2"
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"

          # Build and pipe output to build.log for debugging on failure
          set -o pipefail
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=YES \
            DEBUG_INFORMATION_FORMAT=dwarf \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            | tee build.log

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log

      - name: Boot Simulator
        run: |
          xcrun simctl boot "iPhone 16" || true
          xcrun simctl bootstatus "iPhone 16"

      - name: Install App on Simulator
        run: |
          # Find the built .app
          APP_PATH=$(find ios/build/Build/Products/Release-iphonesimulator -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app found in build directory"
            exit 1
          fi

          echo "Installing App from: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      - name: Run Maestro Flow
        run: |
          maestro test .maestro/flow.yaml --format junit --output report.xml

      - name: Upload Maestro Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts
          path: |
            report.xml
            ~/.maestro/tests/**/*
