name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm test

  e2e-test:
    name: E2E Tests (iOS)
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      EXPO_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      EXPO_PUBLIC_SUPABASE_ANON_KEY: "mock-key"
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: "mock-key"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Prebuild iOS
        # --clean ensures fresh native project
        run: npx expo prebuild --platform ios --clean

      - name: Build and Install iOS App
        # Use Expo CLI to build and install the app on the simulator
        # --no-bundler prevents starting the Metro server
        run: npx expo run:ios --platform ios --device "iPhone 16" --configuration Debug --no-bundler

      - name: Run Maestro Flow
        # Run the flow defined in .maestro/flow.yaml
        run: maestro test .maestro/flow.yaml
